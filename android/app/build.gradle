// App-level build configuration for ست الكل | Set El Kol
// Generated by Capacitor — customize as needed

apply plugin: 'com.android.application'

android {
    namespace "com.setelkol.recipes"
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.setelkol.recipes"
        minSdkVersion rootProject.ext.minSdkVersion   // 24 (Android 7.0)
        targetSdkVersion rootProject.ext.targetSdkVersion  // 35 (Android 15)
        versionCode 1
        versionName "1.0.0"

        // Required for 64-bit support (Play Store requirement)
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    packagingOptions {
        exclude 'META-INF/LICENSE'
        exclude 'META-INF/DEPENDENCIES'
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])

    // Capacitor dependencies (added by Capacitor plugin)
    implementation project(':capacitor-android')
    implementation project(':capacitor-app')
    implementation project(':capacitor-browser')
    implementation project(':capacitor-share')
    implementation project(':capacitor-splash-screen')
    implementation project(':capacitor-status-bar')

    // AndroidX
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.coordinatorlayout:coordinatorlayout:1.2.0'
    implementation 'androidx.webkit:webkit:1.9.0'
    implementation 'com.google.android.material:material:1.11.0'
}
