<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF9F2"/>
      <stop offset="100%" stop-color="#FFE8D6"/>
    </linearGradient>
    <linearGradient id="pot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F07A64"/>
      <stop offset="100%" stop-color="#E8553A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Decorative circle -->
  <circle cx="256" cy="230" r="170" fill="#E8553A" opacity="0.08"/>

  <!-- Pot body -->
  <ellipse cx="256" cy="290" rx="140" ry="100" fill="url(#pot)"/>

  <!-- Pot rim -->
  <ellipse cx="256" cy="220" rx="150" ry="30" fill="#F07A64"/>

  <!-- Pot lid handle -->
  <ellipse cx="256" cy="170" rx="50" ry="16" fill="#F5A623"/>
  <rect x="246" y="160" width="20" height="40" rx="8" fill="#F5A623"/>

  <!-- Steam wisps -->
  <g opacity="0.5" fill="none" stroke="#FFF" stroke-width="4" stroke-linecap="round">
    <path d="M210 140 Q215 110 210 80 Q205 50 215 20"/>
    <path d="M256 130 Q260 95 256 60 Q252 25 260 0"/>
    <path d="M302 140 Q297 110 302 80 Q307 50 297 20"/>
  </g>

  <!-- Arabic text: ست الكل -->
  <text x="256" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="68" fill="#FFF9F2" direction="rtl">ست الكل</text>

  <!-- Small decorative dots -->
  <circle cx="120" cy="140" r="6" fill="#F5A623" opacity="0.4"/>
  <circle cx="392" cy="140" r="6" fill="#F5A623" opacity="0.4"/>
  <circle cx="100" cy="380" r="4" fill="#2D9B4E" opacity="0.3"/>
  <circle cx="412" cy="380" r="4" fill="#2D9B4E" opacity="0.3"/>
</svg>
